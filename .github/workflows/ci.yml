name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-lint-test:
    name: Targeted KMP validation
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Compile shared metadata
        run: ./gradlew :shared:core:compileKotlinMetadata :shared:domain:compileKotlinMetadata :shared:finance-engine:compileKotlinMetadata :shared:application:compileKotlinMetadata :shared:data:compileKotlinMetadata :shared:database:compileKotlinMetadata :shared:bootstrap:compileKotlinMetadata :shared:ui:compileKotlinMetadata --no-daemon --console=plain --stacktrace

      - name: Run critical tests
        run: ./gradlew :shared:finance-engine:test :shared:application:test :shared:data:test :shared:ui:test --no-daemon --console=plain --stacktrace

      - name: Verify SQLDelight migrations
        run: ./gradlew :shared:database:verifyCommonMainTioLedgerDatabaseMigration --no-daemon --console=plain --stacktrace

      - name: Ktlint
        run: ./gradlew ktlintCheck --no-daemon --console=plain --stacktrace

      - name: Detekt
        run: ./gradlew detekt --no-daemon --console=plain --stacktrace
